version: '3.8'

services:
  api:
    build: .
    container_name: jobpilot-api
    command: python -m uvicorn src.jobpilot.dashboard.app:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./cv_master:/app/cv_master
      - ./sessions:/app/sessions
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/jobs"]
      interval: 30s
      timeout: 10s
      retries: 3

  orchestrator:
    build: .
    container_name: jobpilot-orchestrator
    command: python main.py
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./cv_master:/app/cv_master
      - ./sessions:/app/sessions
    env_file:
      - .env
    restart: unless-stopped
    depends_on:
      - api
