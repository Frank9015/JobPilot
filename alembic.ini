# Alembic Configuration File
# Este archivo es generado y modificado por Alembic.

[alembic]
# Ruta a los scripts de migración
script_location = alembic

# Formato del nombre de archivos de migración
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# URL de conexión — se sobreescribe desde el código usando DATABASE_URL del .env
sqlalchemy.url = postgresql://jobpilot:jobpilot@localhost:5432/jobpilot

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
